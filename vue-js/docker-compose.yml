services:
  # 1. MongoDB Service (Database Container)
  db:
    image: mongo:latest
    container_name: vuejs_mongodb_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    volumes:
      - ./mongodb_data:/data/db
    ports:
      - "27018:27017" # Exposed to 27018 to avoid port clash with basic (27017)
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. NodeJS Express Service (Backend API Container)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuejs_nodejs_backend
    restart: always
    environment:
      PORT: ${PORT}
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASS: ${MONGO_ROOT_PASS}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./backend:/app
      - /app/node_modules # Avoid overriding node_modules inside container
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Nginx Web Service (Reverse Proxy & Static Files Host Container)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vuejs_nginx_web
    restart: always
    ports:
      - "8080:80" # Exposed to 8080 to avoid port clash with basic (80)
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
